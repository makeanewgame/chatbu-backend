apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: chatbu
  labels:
    app: backend
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        component: api
    spec:
      containers:
      - name: backend
        image: 152100380489.dkr.ecr.eu-central-1.amazonaws.com/chatbu-backend:backend-latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgresql-app-credentials
              key: uri
        - name: API_URL
          value: "https://backend.chatbu.io"
        - name: FRONTEND_URL
          value: "https://chatbu.io"
        - name: CORS_ORIGIN
          value: "https://chatbu.io"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: chatbu-api-secrets
              key: jwt-secret
        - name: STRIPE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: chatbu-api-secrets
              key: stripe-secret-key
              optional: true
        - name: STRIPE_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: chatbu-api-secrets
              key: stripe-webhook-secret
              optional: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3