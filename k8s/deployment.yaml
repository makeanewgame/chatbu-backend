apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: chatbu
  labels:
    app: backend
    component: api
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        component: api
      annotations:
        # Karpenter consolidation was evicting prod backend pods during
        # cluster-wide rebalancing — observed 2026-06-12 prod outage when
        # all stateless pods were drained at once, the cluster ended up
        # with zero Karpenter nodes, CoreDNS couldn't schedule, EC2 API
        # DNS resolution broke for Karpenter, and a chicken-and-egg
        # deadlock kept the cluster down ~20min. Voluntary disruption
        # off; spot interruption (AWS-driven) is unaffected.
        karpenter.sh/do-not-disrupt: "true"
    spec:
      serviceAccountName: backend-sa
      containers:
      - name: backend
        image: 152100380489.dkr.ecr.eu-central-1.amazonaws.com/chatbu-repo:backend-latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
          name: http
        envFrom:
        - secretRef:
            name: backend-secrets
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
        - name: API_URL
          value: "http://backend:3001"
        - name: FRONTEND_URL
          value: "https://app.chatbu.io"
        - name: CORS_ORIGIN
          value: "https://app.chatbu.io,https://chatbu.io"
        - name: INGEST_ENPOINT
          value: "http://fastapi-gateway-service:8000"
        - name: MCP_API_GATEWAY_URL
          value: "http://fastapi-gateway-service:8000"
        resources:
          requests:
            memory: "1Gi"
            cpu: "300m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3