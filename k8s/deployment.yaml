apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: chatbu
  labels:
    app: backend
    component: api
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        component: api
    spec:
      containers:
      - name: backend
        image: 152100380489.dkr.ecr.eu-central-1.amazonaws.com/chatbu-repo:backend-v1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: DATABASE_URL
        - name: API_URL
          value: "https://backend.chatbu.io"
        - name: FRONTEND_URL
          value: "https://chatbu.io"
        - name: CORS_ORIGIN
          value: "https://chatbu.io"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: JWT_SECRET
        resources:
          requests:
            memory: "1Gi"
            cpu: "300m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 300
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 300
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3