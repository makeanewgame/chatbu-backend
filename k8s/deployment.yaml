apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: chatbu
  labels:
    app: backend
    component: api
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        component: api
    spec:
      containers:
      - name: backend
        image: 152100380489.dkr.ecr.eu-central-1.amazonaws.com/chatbu-repo:backend-latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
          name: http
        envFrom:
        - secretRef:
            name: backend-secrets
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
        - name: API_URL
          value: "http://backend.chatbu.svc.cluster.local:3001"
        - name: FRONTEND_URL
          value: "https://chatbu.io"
        - name: CORS_ORIGIN
          value: "https://app.chatbu.io,https://chatbu.io"
        - name: INGEST_ENPOINT
          value: "http://fastapi-gateway-service.chatbu.svc.cluster.local:8000"
        resources:
          requests:
            memory: "1Gi"
            cpu: "300m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3