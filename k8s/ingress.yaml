apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend
  namespace: chatbu
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # WebSocket desteği için gerekli header'lar
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # Yük dengeleme: sticky session (aynı pod'a bağlansın, WebSocket kopmasın)
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - backend.chatbu.io
    secretName: backend-chatbu-tls
  - hosts:
    - socket.chatbu.io
    secretName: socket-chatbu-tls
  rules:
  - host: backend.chatbu.io
    http:
      paths:
      # REST API (port 3001)
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 3001
      # Diğer tüm istekler API'ye
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 3001
  - host: socket.chatbu.io
    http:
      paths:
      # Socket.IO WebSocket gateway (port 3002, namespace: /events)
      - path: /events
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 3002
