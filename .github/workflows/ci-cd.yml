name: Backend CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: chatbu-repo
  ECR_REGISTRY: 152100380489.dkr.ecr.eu-central-1.amazonaws.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.HELM_REPO_TOKEN }}
          persist-credentials: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          SHORT_SHA=${GITHUB_SHA::7}
          
          echo "version=backend-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "timestamp=backend-${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "latest=backend-latest" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.latest }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.version }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Kubernetes manifest
        run: |
          # Update the image tag in deployment.yaml
          sed -i "s|image: .*|image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.version }}|g" k8s/deployment.yaml

      - name: Commit and push manifest updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          
          git add k8s/deployment.yaml
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🚀 Update backend image to ${{ steps.meta.outputs.version }}

            Automated deployment by GitHub Actions
            Commit: ${GITHUB_SHA}
            Build: #${{ github.run_number }}"
            
            # Configure git to use the token
            git remote set-url origin https://${{ secrets.HELM_REPO_TOKEN }}@github.com/${{ github.repository }}
            git push
          fi

      - name: Deployment summary
        run: |
          echo "✅ Deployment completed successfully!"
          echo "📦 Image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.version }}"
          echo "🔄 ArgoCD will sync automatically"
          echo "🌐 Service will be available at: https://backend.chatbu.io"